global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: voter-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["voter-service:8082"]

  - job_name: election-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["election-service:8083"]

  - job_name: crypto-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["crypto-service:8084"]

  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["audit-service:8085"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8086"]

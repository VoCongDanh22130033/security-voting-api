server:
  port: 8085 # Sử dụng port 8085 cho audit-service

spring:
  application:
    name: audit-service
  datasource:
    # Kết nối cùng database với các service khác để dễ quản lý
    url: jdbc:mysql://localhost:3306/e_voting_system?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # Sẽ tự động tạo bảng audit_logs nếu chưa có
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# Cấu hình Spring Boot Actuator để expose metrics cho Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # Mở các endpoint cần thiết
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name} # Gắn tên ứng dụng vào mọi metric để dễ lọc trong Grafana
